version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DB_PATH=/data/neteye.db
      - AGENT_SECRET=your_secret_here_change_in_production
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:3001
    volumes:
      - backend-data:/data
    networks:
      - neteye
    restart: unless-stopped

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    environment:
      - NETEYE_CONFIG=/app/config.yaml
    volumes:
      - ./agent/config.yaml:/app/config.yaml:ro
    network_mode: host  # Required for local network scanning
    depends_on:
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://backend:3001
      - NEXT_PUBLIC_WS_URL=ws://localhost:3001/ws
    depends_on:
      - backend
    networks:
      - neteye
    restart: unless-stopped

volumes:
  backend-data:

networks:
  neteye:
    driver: bridge
