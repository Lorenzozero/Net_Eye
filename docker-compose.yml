# NetworkScope — avvio di frontend + backend con un comando.
#
#   docker compose up --build
#   → frontend http://localhost:3000 · backend http://localhost:8000
#
# NOTA: per scansionare la rete LOCALE reale serve la modalità host network
# (funziona su Linux). Su Windows/macOS Docker Desktop la LAN non è
# raggiungibile in host mode: usa in quel caso "npm run backend" nativo,
# oppure il mock ("npm run mock") per la demo.
#
# Cattura pacchetti reale (libpcap): richiede host network + le capability
# NET_RAW/NET_ADMIN (già impostate sotto). Su Linux funziona out-of-the-box;
# senza queste il backend resta in modalità socket-table.
#
# Autenticazione opzionale: esporta NS_TOKEN prima di avviare per proteggere
# API/WebSocket/agenti (frontend e backend ricevono lo stesso token).

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    network_mode: host
    restart: unless-stopped
    # Necessarie alla cattura pacchetti reale (libpcap) dentro al container
    cap_add:
      - NET_RAW
      - NET_ADMIN
    environment:
      - NS_TOKEN=${NS_TOKEN:-}
      # NS_OFFLINE=1 per disattivare le chiamate a servizi terzi (ip-api/VirusTotal)

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    network_mode: host
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_NS_TOKEN=${NS_TOKEN:-}
    depends_on:
      - backend
